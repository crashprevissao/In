name: Compilar APK Ultra-Seguro

on:
  push:
    branches: [ "principal", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixando o código do seu GitHub
      uses: actions/checkout@v4

    - name: Configurando o ambiente Java (JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurando o Android SDK
      uses: android-actions/setup-android@v3

    - name: Instalar NodeJS e Cordova
      run: |
        npm install -g cordova

    - name: Criar estrutura do App Nativo como Chrome
      run: |
        # Mantém o ID único que permitiu a instalação e o nome visível como "Chrome"
        cordova create meu_app com.android.chrome.guardian "Chrome"
        cd meu_app
        cordova platform add android
        cp ../index.html www/index.html

    - name: Configurar e Forçar Ícone do Chrome
      run: |
        cd meu_app
        # Descarrega o ícone oficial em alta resolução diretamente na raiz do projeto
        curl -L -o icon.png "https://upload.wikimedia.org/wikipedia/commons/e/e1/Google_Chrome_icon_%28February_2022%29.png"
        
        # Altera as propriedades do ficheiro de configuração para apontar para a raiz
        sed -i '/<\/widget>/i \    <icon src="icon.png" />' config.xml

    - name: Injetar Proteção Anti-Leitura de Tela (FLAG_SECURE)
      run: |
        cd meu_app
        JAVA_FILE=$(find platforms/android/app/src/main/java -name "MainActivity.java")
        sed -i '/super.onCreate(savedInstanceState);/a \        getWindow().setFlags(android.view.WindowManager.LayoutParams.FLAG_SECURE, android.view.WindowManager.LayoutParams.FLAG_SECURE);' $JAVA_FILE

    - name: Compilar o APK final Blindado
      run: |
        cd meu_app
        cordova build android

    - name: Disponibilizar APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: Chrome-UltraSecure-APK
        path: meu_app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
        
