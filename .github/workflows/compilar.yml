name: Compilar APK Ultra-Seguro

on:
  push:
    branches: [ "principal", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixando o código do seu GitHub
      uses: actions/checkout@v4

    - name: Configurando o ambiente Java (JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurando o Android SDK
      uses: android-actions/setup-android@v3

    - name: Instalar NodeJS e Cordova
      run: |
        npm install -g cordova

    - name: Criar estrutura do App Nativo como Chrome
      run: |
        cordova create meu_app com.android.chrome.guardian "Chrome"
        cd meu_app
        cordova platform add android
        cp ../index.html www/index.html

    - name: Adicionar Plug-in de Navegação Nativa Isolada
      run: |
        cd meu_app
        cordova plugin add cordova-plugin-inappbrowser

    - name: Configurar e Forçar Recursos de Ícone do Chrome
      run: |
        cd meu_app
        # Baixa o ícone oficial em alta resolução
        curl -L -o www/icon.png "https://upload.wikimedia.org/wikipedia/commons/e/e1/Google_Chrome_icon_%28February_2022%29.png"
        
        # Altera as propriedades globais do config.xml para vincular a imagem como ícone principal
        sed -i '/<content src="index.html" \/>/a \    <icon src="www/icon.png" />' config.xml
        sed -i '/<platform name="android">/a \        <icon src="www/icon.png" />' config.xml

    - name: Injetar Proteção Total Anti-Espionagem (FLAG_SECURE Global)
      run: |
        cd meu_app
        # Busca TODOS os arquivos Java do aplicativo e dos plug-ins para aplicar a blindagem
        find platforms/android/ -name "*.java" | while read -r java_file; do
          if grep -q "super.onCreate" "$java_file"; then
            echo "Blindando o arquivo: $java_file"
            sed -i '/super.onCreate/a \        getWindow().setFlags(android.view.WindowManager.LayoutParams.FLAG_SECURE, android.view.WindowManager.LayoutParams.FLAG_SECURE);' "$java_file"
          fi
        done

    - name: Compilar o APK final Blindado
      run: |
        cd meu_app
        cordova build android

    - name: Disponibilizar APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: Chrome-UltraSecure-APK
        path: meu_app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
        
