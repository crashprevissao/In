<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome</title>
    <style>
        body {
            font-family: "Roboto", Arial, sans-serif;
            background-color: #f1f3f4;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        /* BARRA DE NAVEGAÇÃO DO CHROME */
        .chrome-bar {
            background-color: #ffffff;
            padding: 10px 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            border-bottom: 1px solid #dadce0;
            z-index: 10;
        }
        .search-container {
            flex: 1;
            display: flex;
            background-color: #f1f3f4;
            border-radius: 20px;
            padding: 8px 16px;
            align-items: center;
        }
        .search-input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 15px;
            color: #202124;
            outline: none;
        }
        .btn-nav {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 6px;
            color: #5f6368;
        }
        .browser-viewport {
            flex: 1;
            width: 100%;
            border: none;
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="chrome-bar">
        <button class="btn-nav" onclick="home()">🏠</button>
        <div class="search-container">
            <span style="margin-right: 8px; color: #34a853;">🔒</span>
            <input type="text" id="url-input" class="search-input" placeholder="Pesquise ou digite o endereço URL" onkeydown="verificarEnter(event)">
        </div>
        <button class="btn-nav" onclick="navegar()">➜</button>
    </div>

    <iframe id="web-frame" class="browser-viewport" src="about:blank"></iframe>

    <script>
        function home() {
            const frame = document.getElementById('web-frame');
            frame.srcdoc = `
                <div style="font-family: Arial, sans-serif; text-align: center; padding-top: 140px;">
                    <h1 style="font-size: 42px; font-weight: bold; letter-spacing: -1px; margin-bottom: 30px;">
                        <span style="color:#4285f4">G</span><span style="color:#ea4335">o</span><span style="color:#fbbc05">o</span><span style="color:#4285f4">g</span><span style="color:#34a853">l</span><span style="color:#ea4335">e</span>
                    </h1>
                </div>
            `;
            document.getElementById('url-input').value = '';
        }

        function verificarEnter(event) {
            if (event.key === 'Enter') navegar();
        }

        function navegar() {
            let input = document.getElementById('url-input').value.trim();
            const frame = document.getElementById('web-frame');

            if (!input) return;

            if (!/^https?:\/\//i.test(input)) {
                input = 'https://' + input;
            }

            // O tráfego passa mascarado e criptografado para o roteador não ler o destino
            const urlMascarada = "https://anonymouse.org/cgi-bin/anon-www.cgi/" + input;
            frame.src = urlMascarada;
        }

        home();
    </script>
</body>
</html>
