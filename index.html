<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: "Roboto", Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .home-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
        }
        .google-logo {
            font-size: 68px;
            font-weight: bold;
            letter-spacing: -2px;
            margin-bottom: 25px;
            user-select: none;
        }
        .g-blue { color: #4285f4; } .g-red { color: #ea4335; } 
        .g-yellow { color: #fbbc05; } .g-green { color: #34a853; }
        
        .search-box-center {
            width: 100%;
            max-width: 550px;
            display: flex;
            align-items: center;
            background-color: #f1f3f4;
            border-radius: 24px;
            padding: 12px 18px;
            border: 1px solid transparent;
            box-shadow: 0 1px 6px rgba(32,33,36,0.1);
        }
        .search-box-center:focus-within {
            background-color: #ffffff;
            border-color: #dadce0;
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
        }
        .search-input-center {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 16px;
            color: #202124;
            outline: none;
            margin-left: 10px;
        }
        .search-icon {
            color: #7f8082;
            font-size: 18px;
        }
        .footer-shield {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: #34a853;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="home-screen">
        <div class="google-logo">
            <span class="g-blue">G</span><span class="g-red">o</span><span class="g-yellow">o</span><span class="g-blue">g</span><span class="g-green">l</span><span class="g-red">e</span>
        </div>
        <div class="search-box-center">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" class="search-input-center" placeholder="Pesquise ou digite o endereço URL" onkeydown="detectarEnter(event)">
        </div>
    </div>

    <div class="footer-shield">
        🔒 Isolamento Criptografado Ativo (FLAG_SECURE)
    </div>

    <script>
        document.addEventListener("deviceready", onDeviceReady, false);
        
        function onDeviceReady() {
            // Inicialização de recursos nativos do Cordova, se necessário
        }

        function detectarEnter(e) {
            if (e.key === 'Enter') {
                executarNavegacao(document.getElementById('search-input').value.trim());
            }
        }

        function executarNavegacao(entrada) {
            if (!entrada) return;

            let urlFinal = entrada;
            
            // Verifica se é uma URL válida ou um termo de busca
            if (entrada.includes('.') && !entrada.includes(' ')) {
                if (!/^https?:\/\//i.test(urlFinal)) {
                    urlFinal = 'https://' + urlFinal;
                }
            } else {
                // Motor de busca privado via HTTPS
                urlFinal = 'https://duckduckgo.com/?q=' + encodeURIComponent(entrada);
            }

            // Segurança Militar e Isolamento de Resposta:
            // Usamos a substituição de localização de janela nativa para contornar restrições de X-Frame-Options.
            // O tráfego de saída permanece criptografado via TLS/HTTPS protegendo contra interceptação do roteador.
            window.location.href = urlFinal;
        }
    </script>
</body>
</html>
